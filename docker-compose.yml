services:
  mysql:
    image: mysql:8.4
    container_name: smarttax-mysql
    environment:
      MYSQL_DATABASE: smarttax
      MYSQL_USER: smarttax
      MYSQL_PASSWORD: smarttax
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - smarttax_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  smarttax_mysql:
