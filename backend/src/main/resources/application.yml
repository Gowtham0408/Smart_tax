server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:smarttax;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

smarttax:
  ocr-service-url: ${OCR_SERVICE_URL:http://localhost:8001}
  ollama-url: ${OLLAMA_URL:http://localhost:11434}
  ollama-model: ${OLLAMA_MODEL:llama3.2}
